[build]
builder = "RAILPACK"
buildCommand = "npm install && npm run prisma:generate -w apps/api && npm run build -w apps/api"
watchPatterns = [
  "/package.json",
  "/package-lock.json",
  "/apps/api/**"
]

[deploy]
startCommand = "npm run start:prod -w apps/api"
preDeployCommand = "npm run prisma:migrate:deploy -w apps/api"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
