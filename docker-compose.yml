version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aidlaboral-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aidlaboral
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aidlaboral-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aidlaboral
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aidlaboral-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-aidlaboral-access-secret}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
